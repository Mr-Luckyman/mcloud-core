version: '3.8'

services:
  calculator:
    build:
      context: .
      dockerfile: Dockerfile.calculator
    image: calculator:v1.0
    container_name: mcloud-calculator
    stdin_open: true
    tty: true

  webserver:
    build:
      context: .
      dockerfile: Dockerfile.webserver
    image: webserver:v1.0
    container_name: mcloud-webserver
    ports:
      - "8080:8080"
  game:
    build:
      context: .
      dockerfile: Dockerfile.game
    image: game:v1.0
    stdin_open: true
    tty: true

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    image: analyzer:v1.0

  spring-app:
    build:
      context: .
      dockerfile: src/main/java/ru/mentee/power/spring/Dockerfile.optimized
    image: spring-boot:slim
    container_name: mcloud-spring
    ports:
      - "8082:8082"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SERVER_PORT=8082
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"